name: Deploy backend

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            PROJECT_PATH=${PROJECT_PATH:-/var/www/vendplug-backend}
            PM2_NAME=${PM2_NAME:-vendplug-api}

            cd "$PROJECT_PATH"

            # Sync code
            git fetch --all --prune
            git reset --hard origin/main
            git clean -fd

            # Install deps (lockfile preferred; fallback allowed)
            rm -rf node_modules
            npm ci --omit=dev --no-audit --no-fund || npm install --omit=dev --legacy-peer-deps --no-audit --no-fund

            # Restart with env
            if ! pm2 describe "$PM2_NAME" >/dev/null 2>&1; then
              pm2 start server.js --name "$PM2_NAME" --cwd "$PROJECT_PATH"
            fi
            pm2 restart "$PM2_NAME" --update-env
            pm2 save

            # Robust health check (wait up to ~60s)
            ok=0
            for i in {1..30}; do
              if curl -fsS http://127.0.0.1:5000/api/health | grep -q '"status":"ok"'; then
                ok=1
                break
              fi
              echo "Waiting for app to be ready... ($i/30)"
              sleep 2
            done
            if [ "$ok" -ne 1 ]; then
              echo 'Health check failed'
              pm2 logs "$PM2_NAME" --lines 200 || true
              exit 1
            fi
            echo 'Health OK'
